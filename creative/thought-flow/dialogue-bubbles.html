<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>对话思维泡 — Dialogue Thought Bubbles</title>
  <script>p5.disableFriendlyErrors = true;</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      background: #f6f5f4;
    }
    canvas { display: block; }
    #overlay {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: rgba(0,0,0,0.45);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.3px;
      pointer-events: none;
      z-index: 10;
    }
    #overlay .title {
      font-size: 17px;
      font-weight: 700;
      color: rgba(0,0,0,0.7);
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }
    #legend {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      gap: 16px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 500;
      pointer-events: none;
      z-index: 10;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .dot-ai { background: #0075de; }
    .dot-human { background: #e8531e; }
    .dot-shared { background: #2a9d99; }
  </style>
</head>
<body>
<div id="overlay">
  <div class="title">💬 对话思维泡</div>
  <div>两个人聊天时，思维如何碰撞与涌现</div>
</div>
<div id="legend">
  <div class="legend-item"><div class="legend-dot dot-ai"></div> AI思维</div>
  <div class="legend-item"><div class="legend-dot dot-human"></div> 人类思维</div>
  <div class="legend-item"><div class="legend-dot dot-shared"></div> 共鸣时刻</div>
</div>
<script>
// === Dialogue Thought Bubbles — 对话思维泡 ===
// Visualizing how thoughts emerge, collide, and resonate in conversation

const CONFIG = {
  maxBubbles: 55,
  spawnInterval: 38,
  baseRadius: 18,
  maxRadius: 52,
  floatSpeed: 0.55,
  wobbleAmp: 0.8,
  mergeThreshold: 0.55,
  burstThreshold: 1.1,
  gravity: -0.04,
  damping: 0.97
};

const PALETTE = {
  bg: [246, 245, 244],
  // Human: warm coral/orange
  human: { hMin: 14, hMax: 28, s: 80, b: 90, a: 45 },
  // AI: cool blue
  ai: { hMin: 205, hMax: 225, s: 75, b: 88, a: 42 },
  // Shared: teal resonance
  shared: { hMin: 165, hMax: 178, s: 70, b: 65, a: 55 },
  // Burst particles
  burst: [255, 240, 200]
};

const SPEAKERS = [
  { xRatio: 0.22, label: '人类', color: PALETTE.human, side: 'left' },
  { xRatio: 0.78, label: 'AI', color: PALETTE.ai, side: 'right' }
];

const SAMPLE_THOUGHTS = [
  '嗯...', '然后呢', '等等', '其实', 'emmm', '对！',
  '有点意思', '真的吗', '我懂了', '等等等等',
  '等等我想想', '哦～', '对对对', '哈哈', 'emmm...',
  '我倒觉得', '不是吧', '等等哈', '有道理',
  '确实', '不过', '虽然', '但是', '可能吧'
];

let bubbles = [];
let particles = [];
let t = 0;
let spawnTimer = 0;
let canvas_w, canvas_h;

class ThoughtBubble {
  constructor(speakerIdx) {
    this.speaker = SPEAKERS[speakerIdx];
    this.x = this.speaker.xRatio * canvas_w + (Math.random() - 0.5) * 80;
    this.y = canvas_h + 30 + Math.random() * 60;
    this.targetY = canvas_h * (0.15 + Math.random() * 0.55);
    this.radius = CONFIG.baseRadius + Math.random() * 22;
    this.targetRadius = this.radius;
    this.vx = (Math.random() - 0.5) * CONFIG.wobbleAmp;
    this.vy = -CONFIG.floatSpeed - Math.random() * 0.5;
    this.life = 1.0;
    this.maxLife = 280 + Math.random() * 200;
    this.age = 0;
    this.settled = false;
    this.merged = false;
    this.text = SAMPLE_THOUGHTS[Math.floor(Math.random() * SAMPLE_THOUGHTS.length)];
    this.hue = this.speaker.color.hMin + Math.random() * (this.speaker.color.hMax - this.speaker.color.hMin);
    this.scalePhase = Math.random() * Math.PI * 2;
    this.pulseAmp = 1.5 + Math.random() * 2;
  }

  update() {
    this.age++;
    this.scalePhase += 0.04;

    if (!this.settled) {
      // Float upward
      this.vy += this.gravity || CONFIG.gravity;
      this.vy *= CONFIG.damping;
      this.x += this.vx + Math.sin(this.scalePhase) * 0.3;
      this.y += this.vy;

      // Settle near target Y
      if (this.y <= this.targetY) {
        this.settled = true;
        this.y = this.targetY;
        this.vy = 0;
      }
    } else {
      // Gentle drift while floating
      this.x += Math.sin(this.scalePhase * 0.5) * 0.35;
      this.y += Math.sin(this.scalePhase * 0.7) * 0.12;
      // Slowly rise
      this.y -= 0.04;
      this.targetY -= 0.03;
    }

    // Gentle pulse
    let pulse = 1 + Math.sin(this.scalePhase) * (this.pulseAmp / this.radius);
    this.displayR = this.radius * pulse;

    // Life decay
    if (this.age > this.maxLife * 0.6) {
      this.life = Math.max(0, 1 - (this.age - this.maxLife * 0.6) / (this.maxLife * 0.4));
    }
  }

  isAlive() {
    return this.life > 0 && this.age < this.maxLife;
  }

  draw(p) {
    let alpha = this.life * (this.speaker.color.a / 255);

    // Outer glow
    let glowR = this.displayR * 1.8;
    let glowSteps = 5;
    for (let i = glowSteps; i > 0; i--) {
      let t = i / glowSteps;
      p.fill(this.hue, this.speaker.color.s * 0.4, this.speaker.color.b, alpha * t * 0.12);
      p.noStroke();
      p.ellipse(this.x, this.y, glowR * 2 * t, glowR * 2 * t);
    }

    // Main bubble
    p.fill(this.hue, this.speaker.color.s, this.speaker.color.b, alpha);
    p.stroke(this.hue, this.speaker.color.s, this.speaker.color.b * 0.7, alpha * 1.2);
    p.strokeWeight(1.2);
    p.ellipse(this.x, this.y, this.displayR * 2, this.displayR * 2);

    // Inner highlight
    p.noStroke();
    p.fill(this.hue, this.speaker.color.s * 0.3, 100, alpha * 0.35);
    p.ellipse(
      this.x - this.displayR * 0.25,
      this.y - this.displayR * 0.25,
      this.displayR * 0.7,
      this.displayR * 0.55
    );

    // Text
    if (this.displayR > 22 && this.life > 0.5) {
      p.fill(0, 0, 20, alpha * 0.85);
      p.noStroke();
      let textSize = Math.min(this.displayR * 0.42, 13);
      p.textSize(textSize);
      p.textAlign(p.CENTER, p.CENTER);
      p.text(this.text, this.x, this.y + 1);
    }
  }
}

class BurstParticle {
  constructor(x, y, hue) {
    this.x = x;
    this.y = y;
    let angle = Math.random() * Math.PI * 2;
    let speed = 1.5 + Math.random() * 3.5;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = 1.0;
    this.decay = 0.018 + Math.random() * 0.015;
    this.size = 3 + Math.random() * 5;
    this.hue = hue + (Math.random() - 0.5) * 25;
    this.s = 85 + Math.random() * 15;
    this.b = 90 + Math.random() * 10;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.06;
    this.vx *= 0.96;
    this.life -= this.decay;
  }

  draw(p) {
    if (this.life <= 0) return;
    p.fill(this.hue, this.s, this.b, this.life * 0.85);
    p.noStroke();
    p.ellipse(this.x, this.y, this.size * this.life, this.size * this.life);
  }

  isAlive() { return this.life > 0; }
}

function spawnBubble(p) {
  if (bubbles.length >= CONFIG.maxBubbles) return;
  let idx = Math.floor(Math.random() * 2);
  bubbles.push(new ThoughtBubble(idx));
}

function checkMerges(p) {
  for (let i = 0; i < bubbles.length; i++) {
    for (let j = i + 1; j < bubbles.length; j++) {
      let a = bubbles[i], b = bubbles[j];
      if (!a.isAlive() || !b.isAlive() || a.merged || b.merged) continue;

      let dx = a.x - b.x;
      let dy = a.y - b.y;
      let dist = Math.sqrt(dx * dx + dy * dy);
      let minDist = (a.displayR + b.displayR) * CONFIG.mergeThreshold;

      if (dist < minDist && dist > 0) {
        // Create merge effect — shared bubble
        let mx = (a.x + b.x) / 2;
        let my = (a.y + b.y) / 2;
        let mr = Math.min((a.displayR + b.displayR) * 0.85, CONFIG.maxRadius);

        // Spawn burst particles
        for (let k = 0; k < 10; k++) {
          particles.push(new BurstParticle(mx, my, PALETTE.shared.hMin + Math.random() * 20));
        }

        a.life = 0;
        b.life = 0;
        a.merged = true;
        b.merged = true;

        // Create shared bubble
        let shared = new ThoughtBubble(0);
        shared.x = mx;
        shared.y = my;
        shared.radius = mr;
        shared.targetRadius = mr;
        shared.displayR = mr;
        shared.settled = true;
        shared.y = my;
        shared.hue = PALETTE.shared.hMin + Math.random() * 13;
        shared.speaker = { color: PALETTE.shared };
        shared.text = '💡';
        shared.maxLife = 160;
        shared.age = 0;
        shared.life = 1;
        shared.scalePhase = 0;
        bubbles.push(shared);
      }
    }
  }
}

function pruneDead() {
  bubbles = bubbles.filter(b => b.isAlive());
  particles = particles.filter(p => p.isAlive());
}

let p5Instance;
new p5(function(p) {
  p5Instance = p;

  p.setup = function() {
    canvas_w = window.innerWidth;
    canvas_h = window.innerHeight;
    p.createCanvas(canvas_w, canvas_h);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.textFont('Inter');
  };

  p.draw = function() {
    p.background(PALETTE.bg[0], PALETTE.bg[1], PALETTE.bg[2]);

    // Draw speaker zones (subtle)
    drawSpeakerZones(p);

    t++;
    spawnTimer++;

    // Spawn new bubbles
    if (spawnTimer >= CONFIG.spawnInterval) {
      spawnBubble(p);
      spawnTimer = 0;
      // Occasionally spawn from both sides
      if (Math.random() < 0.3) {
        setTimeout(() => { if (p5Instance) spawnBubble(p5Instance); }, 300);
      }
    }

    // Update and draw bubbles
    for (let b of bubbles) {
      b.gravity = CONFIG.gravity;
      b.update();
    }

    // Draw shared/merged bubbles first (background layer)
    let sharedBubbles = bubbles.filter(b => b.hue >= 160 && b.hue <= 185);
    let soloBubbles = bubbles.filter(b => b.hue < 160 || b.hue > 185);
    for (let b of soloBubbles) b.draw(p);
    for (let b of sharedBubbles) b.draw(p);

    // Update and draw burst particles
    for (let pt of particles) {
      pt.update();
      pt.draw(p);
    }

    // Check merges
    checkMerges(p);

    // Prune dead
    pruneDead();

    // Spawn initial bubbles
    if (t < 5 && bubbles.length < 6) {
      spawnBubble(p);
      spawnBubble(p);
    }
  };

  function drawSpeakerZones(p) {
    // Subtle zone indicators
    p.noStroke();
    p.textAlign(p.CENTER, p.CENTER);
    p.textSize(11);
    p.fill(0, 0, 0, 8);

    // Left zone
    p.text('— 人类 —', canvas_w * 0.22, canvas_h - 28);
    // Right zone
    p.text('— AI —', canvas_w * 0.78, canvas_h - 28);
  }

  p.mousePressed = function() {
    // Click to spawn a burst near mouse
    for (let i = 0; i < 15; i++) {
      particles.push(new BurstParticle(p.mouseX, p.mouseY, 50 + Math.random() * 30));
    }
  };

  p.windowResized = function() {
    canvas_w = window.innerWidth;
    canvas_h = window.innerHeight;
    p.resizeCanvas(canvas_w, canvas_h);
  };
});
</script>
</body>
</html>
